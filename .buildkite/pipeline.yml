# yaml-language-server: $schema=https://raw.githubusercontent.com/buildkite/pipeline-schema/main/schema.json
---

# Most of the steps need to run on a macOS agent, so let's define it as a root property.
agents:
  queue: mac
env:
  IMAGE_ID: $IMAGE_ID

# This is the default pipeline – it will build and test the app
steps:
  - group: ":eyeglasses: Reader Builds"
    steps:
      - label: ":eyeglasses: Reader ASC Demo Build"
        key: build_asc_reader
        command: |
          if .buildkite/commands/should-skip-job.sh --job-type build; then
            exit 0
          fi

          .buildkite/commands/release-build-reader.sh
        plugins: [$CI_TOOLKIT_PLUGIN]
        artifact_paths:
          - Artifacts/*.zip
          - Artifacts/*.ipa
        notify:
          - github_commit_status:
              context: "Reader ASC Demo Build"

      - block: Distribute Reader via TestFlight
        prompt: Distribute the Reader build via TestFlight?
        key: testflight_triggered_reader
        # Block steps have implicit dependency on the steps that come before them.
        # See https://buildkite.com/docs/pipelines/trigger-step
        #
        # Make it depend on nothing so we don't have to wait for previous steps to finish before the deployment can start.
        depends_on: ~

      - label: ":eyeglasses: Reader one-off TestFlight Upload"
        depends_on: [build_asc_reader, testflight_triggered_reader]
        command: |
          if .buildkite/commands/should-skip-job.sh --job-type build; then
            exit 0
          fi

          .buildkite/commands/release-upload-reader.sh
        plugins: [$CI_TOOLKIT_PLUGIN]
        notify:
          - github_commit_status:
              context: "Reader one-off TestFlight Upload"

  #################
  # Create Prototype Builds for WP and JP
  #################
  - group: "🛠 Prototype Builds"
    steps:
      - label: "🛠 WordPress Prototype Build"
        command: ".buildkite/commands/prototype-build-wordpress.sh"
        plugins: [$CI_TOOLKIT_PLUGIN]
        if: "build.pull_request.id != null || build.pull_request.draft"
        notify:
          - github_commit_status:
              context: "WordPress Prototype Build"

      - label: "🛠 Jetpack Prototype Build"
        command: ".buildkite/commands/prototype-build-jetpack.sh"
        plugins: [$CI_TOOLKIT_PLUGIN]
        if: "build.pull_request.id != null || build.pull_request.draft"
        notify:
          - github_commit_status:
              context: "Jetpack Prototype Build"

  #################
  # Create Builds for Testing
  #################
  - group: "🛠 Builds for Testing"
    steps:
      - label: "🛠 :wordpress: Build for Testing"
        key: "build_wordpress"
        command: ".buildkite/commands/build-for-testing.sh wordpress"
        plugins: [$CI_TOOLKIT_PLUGIN]
        notify:
          - github_commit_status:
              context: "WordPress Build for Testing"

      - label: "🛠 :jetpack: Build for Testing"
        key: "build_jetpack"
        command: ".buildkite/commands/build-for-testing.sh jetpack"
        plugins: [$CI_TOOLKIT_PLUGIN]
        notify:
          - github_commit_status:
              context: "Jetpack Build for Testing"

  #################
  # Run Unit Tests
  #################
  - group: "🔬 Unit Tests"
    steps:
      - label: "🔬 :wordpress: Unit Tests"
        command: ".buildkite/commands/run-unit-tests.sh"
        depends_on: "build_wordpress"
        plugins: [$CI_TOOLKIT_PLUGIN]
        artifact_paths:
          - "build/results/*"
        notify:
          - github_commit_status:
              context: "Unit Tests"
      - label: "🔬 Reader Unit Tests"
        command: ".buildkite/commands/run-unit-tests-reader.sh"
        plugins: [$CI_TOOLKIT_PLUGIN]
        artifact_paths:
          - "build/results/*"
        notify:
          - github_commit_status:
              context: "Reader Unit Tests"
      - label: "🔬 Keystone Unit Tests"
        command: .buildkite/commands/run-unit-tests-for-scheme.sh Keystone
        # Disabled till https://github.com/wordpress-mobile/WordPress-iOS/pull/24537 is completed
        #
        # The boolean value has to be a string explicitly.
        # See validation error against schema.
        if: "false"
        plugins: [$CI_TOOLKIT_PLUGIN]
        artifact_paths:
          - "build/results/*"
        notify:
          - github_commit_status:
              context: "Unit Tests Keystone"
      - label: "🔬 WordPressData Unit Tests"
        command: .buildkite/commands/run-unit-tests-for-scheme.sh WordPressData
        plugins: [$CI_TOOLKIT_PLUGIN]
        artifact_paths:
          - "build/results/*"
        notify:
          - github_commit_status:
              context: "Unit Tests WordPressData"

  #################
  # UI Tests
  #################
  - group: "🔬 UI Tests"
    steps:
      - label: "🔬 :jetpack: UI Tests (iPhone)"
        command: .buildkite/commands/run-ui-tests.sh 'iPhone 17'
        depends_on: "build_jetpack"
        plugins: [$CI_TOOLKIT_PLUGIN]
        artifact_paths:
          - "build/results/*"
          - "build/results/crashes/*"
          - "build/logs/wiremock.txt"
        notify:
          - github_commit_status:
              context: "UI Tests (iPhone)"

      - label: "🔬 :jetpack: UI Tests (iPad)"
        command: .buildkite/commands/run-ui-tests.sh 'iPad (A16)'
        depends_on: "build_jetpack"
        plugins: [$CI_TOOLKIT_PLUGIN]
        artifact_paths:
          - "build/results/*"
          - "build/results/crashes/*"
          - "build/logs/wiremock.txt"
        notify:
          - github_commit_status:
              context: "UI Tests (iPad)"

  #################
  # Linters
  #################
  - group: "Linters"
    steps:
      - label: "☢️ Danger - PR Check"
        command: danger
        key: danger
        if: "build.pull_request.id != null"
        retry:
          manual:
            permit_on_passed: true
        agents:
          queue: "linter"

      - label: ":swift: SwiftLint"
        command: swiftlint
        notify:
          - github_commit_status:
              context: "SwiftLint"
        agents:
          queue: "linter"

      - label: "🧹 Lint Translations"
        command: "gplint /workdir/WordPress/Resources/AppStoreStrings.po"
        plugins:
          - docker#v3.8.0:
              image: "public.ecr.aws/automattic/glotpress-validator:1.0.0"
        agents:
          queue: "default"
        notify:
          - github_commit_status:
              context: "Lint Translations"

      - label: ":sleuth_or_spy: Lint Localized Strings Format"
        command: .buildkite/commands/lint-localized-strings-format.sh
        plugins: [$CI_TOOLKIT_PLUGIN]
